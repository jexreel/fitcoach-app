name: Build FitCoach APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - run: npm ci

      - run: npx cap sync android

      - run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-out.txt || true

      - name: Push build log to repo (readable via API)
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cp /tmp/gradle-out.txt build-log.txt
          git add build-log.txt
          git commit -m "ci: add build log [skip ci]" || echo "nothing to commit"
          git push

      - name: Find and upload APK
        if: always()
        run: |
          APK=$(find android -name "*.apk" 2>/dev/null | head -1)
          echo "APK: $APK"
          if [ -n "$APK" ]; then
            mkdir -p /tmp/out
            cp "$APK" /tmp/out/FitCoach.apk
            echo "SIZE: $(du -h /tmp/out/FitCoach.apk)"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FitCoach-APK
          path: /tmp/out/FitCoach.apk
          if-no-files-found: warn
          retention-days: 30
