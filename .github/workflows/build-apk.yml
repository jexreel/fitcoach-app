name: Build FitCoach APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - run: npm ci

      - run: npx cap sync android

      - run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/android/app/fitcoach.keystore
          echo "Keystore size: $(wc -c < $GITHUB_WORKSPACE/android/app/fitcoach.keystore) bytes"
          ls -la $GITHUB_WORKSPACE/android/app/fitcoach.keystore

      - name: Build Release APK (signed)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/fitcoach.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitCoach-APK-Release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
