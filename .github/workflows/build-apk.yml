name: Build FitCoach APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - run: npm ci

      - run: npx cap sync android

      - run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: List APK output
        if: always()
        run: |
          echo "=== Find APKs ==="
          find android -name "*.apk" 2>/dev/null || echo "none"
          echo "=== outputs dir ==="
          ls -laR android/app/build/outputs/ 2>/dev/null || echo "no outputs dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitCoach-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
