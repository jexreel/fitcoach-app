name: Build FitCoach APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3

      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - run: npm ci

      - run: npx cap sync android

      - run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/fitcoach.keystore

      - name: Build Release APK (signed)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon             -Pandroid.injected.signing.store.file=fitcoach.keystore             -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}             -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}             -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk              android/app/build/outputs/apk/release/FitCoach.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitCoach-APK-Release
          path: android/app/build/outputs/apk/release/FitCoach.apk
          retention-days: 30
