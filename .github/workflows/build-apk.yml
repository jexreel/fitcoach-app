name: Build FitCoach APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - run: npm ci
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/log.txt; echo "EXIT:$?"
      - name: Save log to repo
        if: always()
        run: |
          cp /tmp/log.txt build-log.txt
          git config user.email "ci@fitcoach.app"
          git config user.name "CI Bot"
          git fetch origin main
          git checkout main
          git add build-log.txt
          git diff --staged --quiet || git commit -m "ci: build log [skip ci]"
          git push origin main || true
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FitCoach-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
