name: Build FitCoach APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -60

      - name: Rename and stage APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/FitCoach.apk
          echo "APK size: $(du -h output/FitCoach.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitCoach-APK
          path: output/FitCoach.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ FitCoach APK generada" >> $GITHUB_STEP_SUMMARY
          echo "Descarga la APK desde la sección **Artifacts** de este workflow." >> $GITHUB_STEP_SUMMARY
          ls -lh output/FitCoach.apk
