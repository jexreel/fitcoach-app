name: Build FitCoach APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Search for APK output
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== android/app/build/outputs ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "outputs dir not found"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "apk dir not found"
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "debug dir not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitCoach-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
