name: Build FitCoach APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        id: build
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../build-log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7

      - name: Find and stage APK
        if: always()
        run: |
          echo "=== APK search ==="
          find android -name "*.apk" 2>/dev/null || echo "No APKs found"
          APK=$(find android -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            mkdir -p output
            cp "$APK" output/FitCoach.apk
            echo "✅ APK found: $APK ($(du -h output/FitCoach.apk | cut -f1))"
          else
            echo "❌ No APK produced"
          fi

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FitCoach-APK
          path: output/FitCoach.apk
          retention-days: 30
          if-no-files-found: warn
